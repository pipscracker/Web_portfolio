<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden; /* Bypasses unwanted web wrapper scrolling */
    }
    .player-wrapper {
      width: 100%;
      max-width: 860px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      display: block;
      max-height: 360px; /* Expanded slightly to fill the white frame space cleanly */
      background: #000;
      cursor: pointer;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: #1a1a1a;
    }
    .btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .btn:hover { background: #333; }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: #444;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: #1E88E5;
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }
    .time {
      color: #ccc;
      font-size: 12px;
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input[type=range] {
      width: 70px;
      accent-color: #1E88E5;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="player-wrapper">
  <video id="vid" preload="metadata" onclick="togglePlay()">
    <source src="demo.mp4" type="video/mp4" />
    Your browser does not support HTML5 video.
  </video>
  <div class="controls">
    <button class="btn" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="progress-bar" id="progressBar" onclick="seek(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="time" id="timeDisplay">0:00 / 0:00</span>
    <div class="volume-wrap">
      <span style="color:#ccc;font-size:16px;">🔊</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.05"
             value="1" oninput="setVolume(this.value)" />
    </div>
    <button class="btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
  </div>
</div>
<script>
  const vid = document.getElementById('vid');
  const playBtn = document.getElementById('playBtn');
  const progressFill = document.getElementById('progressFill');
  const timeDisplay = document.getElementById('timeDisplay');

  const params = new URLSearchParams(window.location.search);
  if (params.get('v')) {
    vid.querySelector('source').src = params.get('v');
    vid.load();
  }

  function togglePlay() {
    if (vid.paused) { vid.play(); playBtn.textContent = '⏸'; }
    else            { vid.pause(); playBtn.textContent = '▶'; }
  }
  vid.addEventListener('timeupdate', () => {
    if (!vid.duration) return;
    const pct = (vid.currentTime / vid.duration) * 100;
    progressFill.style.width = pct + '%';
    timeDisplay.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
  });
  vid.addEventListener('ended', () => { playBtn.textContent = '▶'; });
  function seek(e) {
    const bar = document.getElementById('progressBar');
    const rect = bar.getBoundingClientRect();
    vid.currentTime = ((e.clientX - rect.left) / rect.width) * vid.duration;
  }
  function setVolume(v) { vid.volume = v; }
  
  // Custom fullscreen handler target fixes 
  function toggleFullscreen() {
    const wrapper = document.querySelector('.player-wrapper');
    if (!document.fullscreenElement) {
      wrapper.requestFullscreen().catch(err => {
        vid.requestFullscreen();
      });
    } else {
      document.exitFullscreen();
    }
  }
  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }
</script>
</body>
</html>
