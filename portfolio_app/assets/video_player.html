<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .player-wrapper {
      width: 100%;
      max-width: 860px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    video {
      width: 100%;
      display: block;
      max-height: 340px;
      background: #000;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #1a1a1a;
    }

    .btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .btn:hover { background: #333; }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: #444;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: #1E88E5;
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time {
      color: #ccc;
      font-size: 12px;
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input[type=range] {
      width: 70px;
      accent-color: #1E88E5;
      cursor: pointer;
    }

    .loading-msg {
      color: #888;
      font-size: 13px;
      text-align: center;
      padding: 40px 20px;
    }
  </style>
</head>
<body>

<div class="player-wrapper">
  <video id="vid" preload="metadata">
    <!--
      CHANGE "demo.mp4" below to your actual video filename.
      The file must be in your assets/ folder.
    -->
    <source src="try.mp4" type="video/mp4" />
    Your browser does not support HTML5 video.
  </video>

  <div class="controls">
    <button class="btn" id="playBtn" onclick="togglePlay()">▶</button>

    <div class="progress-bar" id="progressBar" onclick="seek(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <span class="time" id="timeDisplay">0:00 / 0:00</span>

    <div class="volume-wrap">
      <span style="color:#ccc;font-size:16px;">🔊</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.05"
             value="1" oninput="setVolume(this.value)" />
    </div>

    <button class="btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
  </div>
</div>

<script>
  const vid = document.getElementById('vid');
  const playBtn = document.getElementById('playBtn');
  const progressFill = document.getElementById('progressFill');
  const timeDisplay = document.getElementById('timeDisplay');

  function togglePlay() {
    if (vid.paused) { vid.play(); playBtn.textContent = '⏸'; }
    else            { vid.pause(); playBtn.textContent = '▶'; }
  }

  vid.addEventListener('timeupdate', () => {
    if (!vid.duration) return;
    const pct = (vid.currentTime / vid.duration) * 100;
    progressFill.style.width = pct + '%';
    timeDisplay.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
  });

  vid.addEventListener('ended', () => { playBtn.textContent = '▶'; });

  function seek(e) {
    const bar = document.getElementById('progressBar');
    const rect = bar.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    vid.currentTime = ratio * vid.duration;
  }

  function setVolume(v) { vid.volume = v; }

  function toggleFullscreen() {
    if (!document.fullscreenElement) vid.requestFullscreen();
    else document.exitFullscreen();
  }

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }
</script>

</body>
</html>
