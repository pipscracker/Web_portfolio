<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #121212;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }
    h2 {
      margin-bottom: 16px;
      font-size: 18px;
      color: #90CAF9;
    }
    video {
      width: 90%;
      max-width: 860px;
      border-radius: 10px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
      background: #000;
    }
    p {
      margin-top: 14px;
      font-size: 13px;
      color: #9E9E9E;
    }
  </style>
</head>
<body>
  <h2>Project Contribution Video</h2>
  <video controls autoplay>
    <source src="demo.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>
  <p>BlastX — Mining &amp; Civil Engineering Estimation System</p>
</body>
</html>
